<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>мы️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg-dark: #0a0612;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(76, 0, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(255, 0, 115, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 217, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(255, 0, 221, 0.1) 0px, transparent 50%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            perspective: 1200px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
        }

        #canvas-dots {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 4rem 3rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 650px;
            width: 90%;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 117, 140, 0.3));
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1:active {
            transform: scale(0.95);
        }

        .subtitle {
            font-weight: 200;
            font-size: 0.9rem;
            margin-bottom: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 1.5rem; /* Уменьшил отступ для подписи */
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* --- ОТМЕТКА О ДАТЕ НАЧАЛА --- */
        .start-info {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .number {
            display: block;
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            font-variant-numeric: tabular-nums;
            transition: all 0.3s ease;
        }

        .number.tick {
            animation: numberPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes numberPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; color: var(--primary); text-shadow: 0 0 30px var(--primary); }
            100% { transform: scale(1); opacity: 1; }
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-top: 8px;
            font-weight: 600;
        }

        .quote-box {
            min-height: 50px;
            padding: 0 20px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            line-height: 1.6;
            transition: all 0.8s;
            font-weight: 300;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: spark-fly 1s ease-out forwards;
        }

        @keyframes spark-fly {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(255, 117, 140, 0.3);
            display: block;
        }

        .close-modal {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 40px;
            cursor: pointer;
            line-height: 1;
        }

        @media (max-width: 500px) {
            .container { padding: 2.5rem 1.5rem; }
            .timer { grid-template-columns: repeat(2, 1fr); }
            .subtitle { letter-spacing: 2px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-dots"></canvas>

    <div class="container" id="tiltCard">
        <h1 id="mainTitle">мы вместе</h1>
        <p class="subtitle">только из за тебя этот счетчик идет дальше)</p>
        
        <div class="timer">
            <div class="time-box">
                <span class="number" id="days">0</span>
                <span class="label">Дней</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">0</span>
                <span class="label">Часов</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">0</span>
                <span class="label">Минут</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">0</span>
                <span class="label">Секунд</span>
            </div>
        </div>

        <div class="start-info">2 ноября 2025 года</div>

        <div class="quote-box" id="quote">
            "любовь - когда весь мир в одном человеке. ну в тебе крч"
        </div>
    </div>

    <!-- Модалка для фото -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <img src="mylove.jpg" alt="my love">
        </div>
    </div>

    <script>
        // --- ДАТА ---
        const targetDate = new Date("2025-11-02T01:28:34"); 

        function updateValue(id, newValue) {
            const element = document.getElementById(id);
            const formattedValue = newValue < 10 ? '0' + newValue : newValue;
            if (element.innerText !== String(formattedValue)) {
                element.innerText = formattedValue;
                element.classList.remove('tick');
                void element.offsetWidth;
                element.classList.add('tick');
            }
        }

        function updateTimer() {
            const now = new Date();
            let diff = now - targetDate;
            const title = document.getElementById('mainTitle');

            if (diff < 0) {
                diff = Math.abs(diff);
                if(title.innerText !== "до встречи") title.innerText = "до встречи";
            } else {
                if(title.innerText !== "мы вместе") title.innerText = "мы вместе";
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            updateValue('days', d);
            updateValue('hours', h);
            updateValue('minutes', m);
            updateValue('seconds', s);
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // --- МОДАЛКА ---
        const mainTitle = document.getElementById('mainTitle');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');

        mainTitle.addEventListener('click', (e) => {
            e.stopPropagation();
            modalOverlay.classList.add('active');
        });

        const hideModal = () => modalOverlay.classList.remove('active');
        closeModal.addEventListener('click', hideModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) hideModal();
        });

        // --- ФОН И ЭФФЕКТЫ ---
        const canvas = document.getElementById('canvas-dots');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 117, 140, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { initCanvas(); createParticles(); });
        initCanvas(); createParticles(); animate();

        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            const rotateX = (window.innerHeight / 2 - e.clientY) / 35;
            const rotateY = (e.clientX - window.innerWidth / 2) / 35;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('click', (e) => {
            if (modalOverlay.classList.contains('active')) return;
            for (let i = 0; i < 10; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                const color = ['#ff758c', '#ff7eb3', '#ffffff'][Math.floor(Math.random() * 3)];
                spark.style.backgroundColor = color;
                spark.style.boxShadow = `0 0 10px ${color}`;
                spark.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
                spark.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        });

        const quotes = [
            "любовь - это когда весь мир в одном человеке. ну в тебе крч",
            "ты самое ценное что у меня есть",
            "правда очень сильно тебя люблю,солнышко мое",
            "беемс",
            "ты самая лучшая!!!!!",
            "спасибо что до сих пор рядом"
        ];
        
        const quoteElement = document.getElementById('quote');
        let quoteIndex = 0;

        setInterval(() => {
            quoteElement.style.opacity = 0;
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                quoteElement.innerText = quotes[quoteIndex];
                quoteElement.style.opacity = 0.8;
            }, 800);
        }, 5000);

    </script>
</body>
</html>
